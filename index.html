<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* контейнер */
.container {
    padding: 15px;
}

/* карточки */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    backdrop-filter: blur(10px);
}

/* баланс */
.balance {
    font-size: 32px;
    font-weight: bold;
}

.small {
    opacity: 0.6;
}

/* кнопки */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.actions button {
    flex: 1;
    padding: 15px;
    border-radius: 15px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

/* большая кнопка */
.main-btn {
    margin-top: 15px;
    width: 100%;
    padding: 18px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(90deg, orange, red);
    color: white;
    font-size: 18px;
}

/* нижнее меню */
.menu {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: rgba(0,0,0,0.8);
}

.menu button {
    flex: 1;
    padding: 15px;
    border: none;
    background: none;
    color: white;
}
</style>
</head>

<body>

<div class="container">

    <!-- баланс -->
    <div class="card">
        <div class="small">Общий баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>

    <!-- действия -->
    <div class="card">
        <div class="actions">
            <button onclick="alert('вывод')">⬆️ Вывод</button>
            <button onclick="alert('холд')">💰 Холд</button>
            <button onclick="alert('задания')">📋 Задания</button>
        </div>

        <button class="main-btn">💡 Как заработать?</button>
    </div>

    <!-- игра -->
    <div class="card">
        <div>⚽ Мини игра</div>
        <button class="main-btn" onclick="openGame()">Играть</button>
    </div>

</div>

<!-- нижнее меню -->
<div class="menu">
    <button>💰</button>
    <button>👥</button>
    <button onclick="openGame()">🎮</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = 0;

function update() {
    document.getElementById("coins").innerText = coins + " FC";
}

function openGame() {
    alert("Дальше сюда вставим твою игру с таймингом ⚽");
}
</script>

</body>
</html>
