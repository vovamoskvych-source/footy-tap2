<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  margin-top: 60px;
}

.player {
  font-size: 80px;
}

.score {
  font-size: 50px;
  margin: 20px;
}

button {
  font-size: 25px;
  padding: 15px 30px;
  border-radius: 15px;
  border: none;
  background: #22c55e;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <h1>⚽️ Footy Coin</h1>

  <div class="player">🧑‍🦰⚽️</div>

  <div class="score">
    Coins: <span id="coins">0</span>
  </div>

  <button onclick="tap()">KICK ⚽️</button>
</div>

<script>
let tg = window.Telegram?.WebApp;
if (tg) tg.ready();

let coins = 0;

function tap() {
  coins += 1;
  document.getElementById("coins").innerText = coins;
}
</script>

</body>
</html>
