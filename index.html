<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

/* MAIN */
.container {
    padding: 15px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
}

.balance {
    font-size: 32px;
    color: #00ff88;
}

/* MENU */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

.menu button {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #00ff88;
    font-size: 26px;
    transform: translateY(-20px);
    box-shadow: 0 0 20px #00ff88;
}

/* GAME */
#gameScreen {
    display: none;
    position: fixed;
    inset: 0;
    overflow: hidden;
}

/* 🏟 СТАДИОН */
.stadium {
    position: absolute;
    inset: 0;
    background: url("https://images.unsplash.com/photo-1508098682722-e99c43a406b2") center/cover;
    filter: brightness(0.5);
}

/* затемнение */
.overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at bottom, transparent, #000 85%);
}

/* 🥅 ВОРОТА */
.goal {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 110px;
    border: 4px solid white;
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
}

/* 👤 ИГРОК */
.player {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    font-size: 180px;
    filter: drop-shadow(0 0 30px #00ff88);
}

/* ⚽ МЯЧ */
.ball {
    position: absolute;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background:
        radial-gradient(circle at 30% 30%, white, #ccc),
        repeating-linear-gradient(60deg, black 0 6px, white 6px 12px);
    bottom: 220px;
    left: 50%;
    transform: translateX(-50%);
    box-shadow: 0 0 20px white;
}

/* UI */
.ui {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
}

#score {
    font-size: 40px;
    color: #00ff88;
}

/* 🎮 КНОПКА */
#kickBtn {
    display: none;
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: none;
    font-size: 22px;
    background: radial-gradient(circle, #00ff88, #00cc66);
    box-shadow: 0 0 40px #00ff88;
}

/* старт */
#startBtn {
    padding: 15px 30px;
    border-radius: 12px;
    border: none;
    background: #00ff88;
}
</style>
</head>

<body>

<!-- MAIN -->
<div class="container" id="main">
    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen">

    <div class="stadium"></div>
    <div class="overlay"></div>

    <div class="goal"></div>
    <div class="player">🧍‍♂️</div>
    <div class="ball" id="ball"></div>

    <div class="ui">
        <h2>⚽ FOOTY COIN</h2>
        <button id="startBtn" onclick="startGame()">START</button>
        <div id="score">0</div>
        <div id="status"></div>
    </div>

    <button id="kickBtn" onclick="kick()">KICK</button>
    <button onclick="closeGame()">⬅</button>

</div>

<!-- MENU -->
<div class="menu" id="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = 0;
let score = 0;

let ballY = 220;
let velocity = 0;
let gravity = -0.25;

let playing = false;

function openGame() {
    main.style.display = "none";
    gameScreen.style.display = "block";
    menu.style.display = "none";
}

function closeGame() {
    main.style.display = "block";
    gameScreen.style.display = "none";
    menu.style.display = "flex";
    playing = false;
}

function startGame() {
    score = 0;
    ballY = 220;
    velocity = 0;
    playing = true;

    startBtn.style.display = "none";
    kickBtn.style.display = "block";
    status.innerText = "";

    loop();
}

function loop() {
    if (!playing) return;

    velocity += gravity;
    ballY += velocity;

    if (ballY <= 120) {
        lose();
        return;
    }

    ball.style.bottom = ballY + "px";

    requestAnimationFrame(loop);
}

function kick() {
    if (!playing) return;

    velocity = 10;
    score++;

    coins += 1;

    score.innerText = score;

    ball.style.transform = "translateX(-50%) scale(1.2)";
    setTimeout(() => {
        ball.style.transform = "translateX(-50%) scale(1)";
    }, 100);
}

function lose() {
    playing = false;
    status.innerText = "❌ " + score;

    startBtn.style.display = "block";
    kickBtn.style.display = "none";
}
</script>

</body>
</html>
