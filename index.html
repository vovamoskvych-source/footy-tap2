<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ball Debug Safe</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #14532d;
}

#ball {
    position: absolute;
    left: 100px;
    bottom: 0px;
    width: 60px;
    height: 60px;
    background: red;
    border-radius: 50%;
    z-index: 10;
}

#debug {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 14px;
    z-index: 999;
}
</style>
</head>

<body>

<div id="ball"></div>
<div id="debug">loading...</div>

<script>
const ball = document.getElementById("ball");
const debug = document.getElementById("debug");

let y = 0;
let vy = 0;

const gravity = 0.6;
const jumpPower = 14;

let canJump = true;

/* ПРЫЖОК */
window.addEventListener("pointerdown", () => {
    if (canJump) {
        vy = jumpPower;
        canJump = false;
    }
});

function loop() {

    vy -= gravity;
    y += vy;

    // ЖЁСТКАЯ ЗАЩИТА ОТ УЛЁТА
    if (y > 300) y = 300;

    if (y < 0) {
        y = 0;
        vy = 0;
        canJump = true;
    }

    ball.style.bottom = y + "px";

    debug.innerText =
        "y=" + y.toFixed(1) +
        " vy=" + vy.toFixed(1);

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
