<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MAIN -->
<div id="main">
    <div class="top">
        <div class="balance" id="coins">0 FC</div>

        <div class="miniMenu">
            <button>Ввод</button>
            <button>Вывод</button>
            <button>Холд</button>
            <button>Рефералы</button>
        </div>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen">

    <div class="field"></div>

    <div id="ball"></div>

    <div id="ui">
        <div id="score">0</div>
        <div id="status"></div>
        <button onclick="closeGame()">⬅</button>
    </div>

    <div id="start">
        <button onclick="startGame()">START</button>
    </div>

</div>

<!-- MENU -->
<div class="menu">
    <button>💰</button>
    <button>👥</button>
    <button onclick="openGame()" class="play">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script src="script.js"></script>

</body>
</html>
