<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* MAIN */
.container {
    padding: 15px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
}

.balance {
    font-size: 32px;
    color: #00ff88;
}

.title {
    margin-bottom: 10px;
    font-size: 18px;
    color: #00ff88;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.action {
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

/* MENU */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

.menu button {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #00ff88;
    font-size: 26px;
    transform: translateY(-20px);
}

/* GAME */
#gameScreen {
    display: none;
    position: fixed;
    inset: 0;
    overflow: hidden;
}

/* фон */
.field {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(#111827, #14532d);
}

/* мяч */
.ball {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: white;
    left: 80px;
    bottom: 120px;
}

/* препятствия */
.obstacle {
    position: absolute;
    width: 30px;
    height: 60px;
    background: red;
    bottom: 120px;
}

/* UI */
.ui {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
}

#score {
    font-size: 30px;
    color: #00ff88;
}

/* кнопка */
#jumpBtn {
    position: fixed;
    bottom: 40px;
    right: 20px;
    padding: 20px;
    border-radius: 50%;
    background: #00ff88;
    border: none;
}
</style>
</head>

<body>

<!-- MAIN -->
<div class="container" id="main">

    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>

    <div class="card">
        <div class="title">Финансы</div>
        <div class="grid">
            <button class="action">💸 Ввод</button>
            <button class="action">💰 Вывод</button>
            <button class="action">⏳ Hold</button>
            <button class="action">👥 Друзья</button>
        </div>
    </div>

    <div class="card">
        <div class="title">Рефералы</div>
        <p>Приглашено: <span id="refs">0</span></p>
    </div>

</div>

<!-- GAME -->
<div id="gameScreen">

    <div class="field"></div>

    <div class="ball" id="ball"></div>

    <div class="ui">
        <h2>⚽ Ball Rush</h2>
        <div id="score">0</div>
        <div id="status">Нажми чтобы прыгнуть</div>
        <button onclick="closeGame()">⬅ Назад</button>
    </div>

    <button id="jumpBtn">↑</button>

</div>

<!-- MENU -->
<div class="menu" id="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = 0;
let score = 0;

let ballY = 120;
let velocity = 0;
let gravity = -0.5;

let obstacles = [];
let playing = false;

/* открыть игру */
function openGame() {
    main.style.display = "none";
    gameScreen.style.display = "block";
    menu.style.display = "none";

    startGame();
}

/* закрыть */
function closeGame() {
    main.style.display = "block";
    gameScreen.style.display = "none";
    menu.style.display = "flex";
    playing = false;
}

/* старт */
function startGame() {
    score = 0;
    ballY = 120;
    velocity = 0;
    obstacles = [];
    playing = true;

    loop();
}

/* цикл */
function loop() {
    if (!playing) return;

    velocity += gravity;
    ballY += velocity;

    if (ballY < 0) ballY = 0;

    ball.style.bottom = ballY + "px";

    /* спавн препятствий */
    if (Math.random() < 0.02) {
        let obs = document.createElement("div");
        obs.className = "obstacle";
        obs.style.left = window.innerWidth + "px";
        gameScreen.appendChild(obs);
        obstacles.push(obs);
    }

    /* движение */
    obstacles.forEach((obs, i) => {
        let x = parseInt(obs.style.left);
        x -= 5;
        obs.style.left = x + "px";

        /* столкновение */
        if (x < 100 && x > 50 && ballY < 100) {
            lose();
        }

        if (x < -50) {
            obs.remove();
            obstacles.splice(i, 1);
            score++;
            coins++;

            document.getElementById("score").innerText = score;
            document.getElementById("coins").innerText = coins + " FC";
        }
    });

    requestAnimationFrame(loop);
}

/* прыжок */
document.getElementById("jumpBtn").onclick = () => {
    velocity = 10;
};

/* проигрыш */
function lose() {
    playing = false;
    document.getElementById("status").innerText = "❌ Проиграл";
}
</script>

</body>
</html>
