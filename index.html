<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at center, #0f5132, #020202);
    color: white;
    text-align: center;
    overflow: hidden;
}

/* фон стадиона эффект */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: repeating-radial-gradient(circle, rgba(0,255,136,0.05) 0px, transparent 2px);
    animation: moveBg 10s linear infinite;
}

@keyframes moveBg {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

h1 {
    margin-top: 20px;
    color: #00ff88;
    text-shadow: 0 0 15px #00ff88;
}

.coins {
    font-size: 24px;
    margin: 10px;
}

/* игрок */
.player-container {
    margin-top: 30px;
}

.player {
    width: 150px;
    transition: transform 0.2s;
}

/* анимация удара */
.kick {
    transform: rotate(-20deg) scale(1.1);
}

/* мяч */
.ball {
    width: 40px;
    position: relative;
    top: -20px;
    transition: transform 0.2s;
}

/* полоса */
.bar {
    position: relative;
    width: 80%;
    height: 30px;
    background: #222;
    margin: 30px auto;
    border-radius: 15px;
    overflow: hidden;
}

.green-zone {
    position: absolute;
    left: 45%;
    width: 10%;
    height: 100%;
    background: rgba(0, 255, 136, 0.5);
}

.slider {
    position: absolute;
    width: 5px;
    height: 100%;
    background: white;
    left: 0;
}

/* кнопка */
button {
    padding: 15px 40px;
    font-size: 20px;
    background: linear-gradient(45deg, #00ff88, #00ccff);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 20px;
    color: black;
    font-weight: bold;
}

button:active {
    transform: scale(0.95);
}

</style>
</head>

<body>

<h1>⚽️ Footy Coin</h1>
<div class="coins">💰 Coins: <span id="coins">0</span></div>

<div class="player-container">
    <img src="https://i.imgur.com/6XKQF9E.png" class="player" id="player">
    <br>
    <img src="https://i.imgur.com/W4bQp3I.png" class="ball" id="ball">
</div>

<div class="bar">
    <div class="green-zone"></div>
    <div class="slider" id="slider"></div>
</div>

<button onclick="hit()">KICK ⚽️</button>

<script>
let coins = 0;
let pos = 0;
let direction = 1;

const slider = document.getElementById("slider");
const coinText = document.getElementById("coins");
const player = document.getElementById("player");
const ball = document.getElementById("ball");

// движение полосы
setInterval(() => {
    pos += direction * 2;

    if (pos >= 95) direction = -1;
    if (pos <= 0) direction = 1;

    slider.style.left = pos + "%";
}, 10);

function hit() {
    // анимация игрока
    player.classList.add("kick");
    ball.style.transform = "translateY(-40px)";

    setTimeout(() => {
        player.classList.remove("kick");
        ball.style.transform = "translateY(0)";
    }, 200);

    // логика
    if (pos >= 45 && pos <= 55) {
        coins += 1;
    } else if (pos >= 35 && pos <= 65) {
        coins += 0.3;
    }

    coinText.innerText = coins.toFixed(1);
}
</script>

</body>
</html>
