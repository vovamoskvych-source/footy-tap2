<script>
const ball = document.getElementById("ball");
const scoreEl = document.getElementById("score");

let y = 0;
let vy = 0;

const gravity = 0.9;     // чуть сильнее падение = быстрее возвращение
const jumpPower = 18;    // ВАЖНО: теперь высокий прыжок

let canDoubleJump = true;

let obstacles = [];
let score = 0;

/* ПРЫЖОК + ДАБЛ */
window.addEventListener("pointerdown", () => {

    if (y === 0) {
        vy = jumpPower;
        canDoubleJump = true;
    } 
    else if (canDoubleJump) {
        vy = jumpPower * 0.85; // второй слабее, но ощущается
        canDoubleJump = false;
    }
});

/* ОБНОВЛЕНИЕ */
function loop() {

    vy -= gravity;
    y += vy;

    if (y < 0) {
        y = 0;
        vy = 0;
        canDoubleJump = true;
    }

    ball.style.bottom = y + "px";

    requestAnimationFrame(loop);
}

loop();

/* ПРЕПЯТСТВИЯ */
setInterval(() => {
    let obs = document.createElement("div");
    obs.className = "obstacle";

    let h = 70 + Math.random() * 90;

    obs.style.height = h + "px";
    obs.style.left = window.innerWidth + "px";

    document.body.appendChild(obs);
    obstacles.push(obs);
}, 1500);

function move() {
    obstacles.forEach((o, i) => {
        let x = parseFloat(o.style.left);
        x -= 5;
        o.style.left = x + "px";

        if (x < 140 && x > 90 && y < parseFloat(o.style.height)) {
            alert("LOSE");
            location.reload();
        }

        if (x < -100) {
            o.remove();
            obstacles.splice(i, 1);
            score++;
            scoreEl.innerText = score;
        }
    });

    requestAnimationFrame(move);
}

move();
</script>
