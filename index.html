<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
}

/* MAIN */
.container {
    padding: 15px;
    background: radial-gradient(circle at top, #0f172a, #020617);
    min-height: 100vh;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
}

.balance {
    font-size: 30px;
    color: #00ff88;
}

/* MENU */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

.menu button {
    background: rgba(255,255,255,0.1);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #00ff88;
    font-size: 26px;
    transform: translateY(-20px);
}

/* GAME FULL */
#gameScreen {
    display: none;
    position: fixed;
    inset: 0;
    overflow: hidden;
}

/* СТАДИОН */
.stadium {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://i.imgur.com/6Iej2c3.jpg') center/cover no-repeat;
}

/* игрок */
.player {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
}

/* мяч */
.ball {
    position: absolute;
    width: 40px;
    bottom: 140px;
    left: 50%;
    transform: translateX(-50%);
    transition: transform 0.1s;
}

/* UI */
.ui {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
}

button {
    padding: 12px 18px;
    border-radius: 12px;
    border: none;
    background: #00ff88;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- MAIN -->
<div class="container" id="main">
    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen">

    <div class="stadium"></div>

    <img class="player" src="https://i.imgur.com/9Xn4Xxk.png">
    <img class="ball" id="ball" src="https://i.imgur.com/fP6QK5v.png">

    <div class="ui">
        <h2>⚽ Footy Skill</h2>
        <button id="startBtn" onclick="startGame()">▶ START</button>
        <p id="score">0</p>
        <p id="status"></p>
        <button id="kickBtn" onclick="kick()" style="display:none;">KICK</button>
        <br><br>
        <button onclick="closeGame()">⬅ Назад</button>
    </div>

</div>

<!-- MENU -->
<div class="menu" id="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = 0;
let score = 0;

let ballY = 140;
let velocity = 0;
let gravity = -0.5;

let playing = false;

function updateCoins() {
    document.getElementById("coins").innerText = coins + " FC";
}
updateCoins();

function openGame() {
    document.getElementById("main").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    document.getElementById("menu").style.display = "none";
}

function closeGame() {
    document.getElementById("main").style.display = "block";
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("menu").style.display = "flex";
    playing = false;
}

function startGame() {
    score = 0;
    ballY = 140;
    velocity = 0;
    playing = true;

    document.getElementById("startBtn").style.display = "none";
    document.getElementById("kickBtn").style.display = "inline-block";

    loop();
}

function loop() {
    if (!playing) return;

    velocity += gravity;
    ballY += velocity;

    if (ballY <= 80) {
        lose();
        return;
    }

    document.getElementById("ball").style.bottom = ballY + "px";

    requestAnimationFrame(loop);
}

function kick() {
    if (!playing) return;

    velocity = 9;
    score++;

    coins += 1;
    updateCoins();

    document.getElementById("score").innerText = score;
}

function lose() {
    playing = false;

    document.getElementById("status").innerText ="❌ Упал! Счёт: " + score;

    document.getElementById("startBtn").style.display = "inline-block";
    document.getElementById("kickBtn").style.display = "none";
}
</script>

</body>
</html>
