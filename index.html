<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MAIN -->
<div class="container" id="main">
    <div class="card">
        <div class="label">Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>

    <div class="card center">
        <h2>⚽ FOOTY COIN</h2>
        <p>Набивай мяч и зарабатывай</p>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen">

    <!-- фон стадиона -->
    <div class="stadium"></div>
    <div class="overlay"></div>

    <!-- игрок -->
    <div class="player-zone">
        <div class="player-glow"></div>
    </div>

    <!-- мяч -->
    <div class="ball" id="ball"></div>

    <!-- UI -->
    <div class="top-ui">
        <div id="score">0</div>
        <div id="status">Tap to start</div>
    </div>

    <!-- кнопки -->
    <button id="startBtn" class="start-btn" onclick="startGame()">START</button>
    <button id="kickBtn" class="kick-btn" onclick="kick()">KICK</button>
    <button class="back-btn" onclick="closeGame()">←</button>

</div>

<!-- MENU -->
<div class="menu" id="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = Number(localStorage.getItem("coins")) || 0;
let score = 0;

let ballY = 200;
let velocity = 0;
let gravity = -0.45;

let playing = false;

function updateCoins() {
    document.getElementById("coins").innerText = coins + " FC";
    localStorage.setItem("coins", coins);
}
updateCoins();

function openGame() {
    main.style.display = "none";
    gameScreen.style.display = "block";
    menu.style.display = "none";
}

function closeGame() {
    main.style.display = "block";
    gameScreen.style.display = "none";
    menu.style.display = "flex";
    playing = false;
}

/* старт */
function startGame() {
    score = 0;
    ballY = 200;
    velocity = 0;
    playing = true;

    startBtn.style.display = "none";
    kickBtn.style.display = "block";
    status.innerText = "";

    loop();
}

/* физика */
function loop() {
    if (!playing) return;

    velocity += gravity;
    ballY += velocity;

    if (ballY <= 110) {
        lose();
        return;
    }

    ball.style.bottom = ballY + "px";

    requestAnimationFrame(loop);
}

/* удар */
function kick() {
    if (!playing) return;

    velocity = 8;
    score++;

    coins += 1;
    updateCoins();

    scoreEl.innerText = score;

    // анимация
    ball.style.transform = "translateX(-50%) scale(1.2)";
    setTimeout(() => {
        ball.style.transform = "translateX(-50%) scale(1)";
    }, 100);
}

/* проигрыш */
function lose() {
    playing = false;

    status.innerText = "❌ " + score;
    startBtn.style.display = "block";
    kickBtn.style.display = "none";

    // тряска
    gameScreen.classList.add("shake");
    setTimeout(() => gameScreen.classList.remove("shake"), 300);
}
</script>

</body>
</html>
