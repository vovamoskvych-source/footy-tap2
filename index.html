<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0b3d2e, #111);
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
    color: #00ff88;
}

.coins {
    font-size: 24px;
    margin: 10px;
}

.game {
    margin-top: 40px;
}

.bar {
    position: relative;
    width: 80%;
    height: 30px;
    background: #333;
    margin: 40px auto;
    border-radius: 15px;
    overflow: hidden;
}

.green-zone {
    position: absolute;
    left: 45%;
    width: 10%;
    height: 100%;
    background: rgba(0, 255, 136, 0.4);
}

.slider {
    position: absolute;
    width: 5px;
    height: 100%;
    background: white;
    left: 0;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    background: #00ff88;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 20px;
}

button:active {
    transform: scale(0.95);
}

.player {
    font-size: 20px;
    margin-top: 20px;
    opacity: 0.8;
}
</style>
</head>

<body>

<h1>⚽️ Footy Coin</h1>

<div class="coins">💰 Coins: <span id="coins">0</span></div>

<div class="player">Player: Palmer 🔥</div>

<div class="game">
    <div class="bar">
        <div class="green-zone"></div>
        <div class="slider" id="slider"></div>
    </div>

    <button onclick="hit()">KICK ⚽️</button>
</div>

<script>
let coins = 0;
let pos = 0;
let direction = 1;

const slider = document.getElementById("slider");
const coinText = document.getElementById("coins");

// движение полосы
setInterval(() => {
    pos += direction * 2;

    if (pos >= 95) direction = -1;
    if (pos <= 0) direction = 1;

    slider.style.left = pos + "%";
}, 10);

function hit() {
    // зелёная зона 45% - 55%
    if (pos >= 45 && pos <= 55) {
        coins += 1;
        alert("🔥 Perfect! +1 Coin");
    } else if (pos >= 35 && pos <= 65) {
        coins += 0.3;
        alert("👍 Good! +0.3 Coin");
    } else {
        alert("❌ Miss!");
    }

    coinText.innerText = coins.toFixed(1);
}
</script>

</body>
</html>
