<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #064e3b, #022c22);
  color: white;
  text-align: center;
}

.container {
  margin-top: 30px;
}

h1 {
  font-size: 28px;
}

.player {
  width: 140px;
  margin: 20px;
  transition: 0.1s;
}

.score {
  font-size: 28px;
}

.energy-bar {
  width: 200px;
  height: 15px;
  background: #1f2937;
  margin: 10px auto;
  border-radius: 10px;
  overflow: hidden;
}

.energy-fill {
  height: 100%;
  background: #22c55e;
  width: 100%;
}

button {
  margin-top: 10px;
  font-size: 18px;
  padding: 12px 20px;
  border-radius: 12px;
  border: none;
  background: #16a34a;
  color: white;
}

.shop {
  margin-top: 20px;
}

.coin-popup {
  position: absolute;
  color: yellow;
  font-size: 20px;
  animation: float 1s ease-out forwards;
}

@keyframes float {
  0% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-50px); }
}
</style>
</head>

<body>

<div class="container">
  <h1>⚽️ Footy Coin</h1>

  <!-- Игрушечный игрок -->
  <div id="player" class="player">🧍‍♂️⚽️</div>

  <div class="score">
    💰 Coins: <span id="coins">0</span>
  </div>

  <div class="energy-bar">
    <div id="energyFill" class="energy-fill"></div>
  </div>
  <div>⚡️ Energy: <span id="energy">100</span>/100</div>

  <button onclick="tap()">KICK ⚽️</button>

  <div class="shop">
    <h3>⚙️ Upgrades</h3>
    <button id="upgradeBtn" onclick="upgrade()">x2 Income (50)</button>
  </div>
</div>

<script>
let tg = window.Telegram?.WebApp;
if (tg) tg.ready();

let coins = 0;
let energy = 100;
let maxEnergy = 100;
let income = 1;
let upgradeCost = 50;

function tap() {
  if (energy <= 0) return;

  energy--;
  coins += income;

  updateUI();

  let player = document.getElementById("player");
  player.style.transform = "rotate(20deg)";
  setTimeout(() => player.style.transform = "rotate(0deg)", 100);

  showCoinPopup();
}

function updateUI() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("energy").innerText = energy;

  let percent = (energy / maxEnergy) * 100;
  document.getElementById("energyFill").style.width = percent + "%";

  document.getElementById("upgradeBtn").innerText =
    x2 Income (${upgradeCost});
}

// медленнее энергия
setInterval(() => {
  if (energy < maxEnergy) {
    energy += 1;
    updateUI();
  }
}, 2000);

// апгрейд
function upgrade() {
  if (coins >= upgradeCost) {
    coins -= upgradeCost;
    income *= 2;
    upgradeCost *= 2;

    updateUI();
  }
}

// +монеты анимация
function showCoinPopup() {
  let popup = document.createElement("div");
  popup.innerText = "+" + income;
  popup.className = "coin-popup";

  popup.style.left = (window.innerWidth / 2 - 10) + "px";
  popup.style.top = (window.innerHeight / 2) + "px";

  document.body.appendChild(popup);

  setTimeout(() => popup.remove(), 1000);
}

updateUI();
</script>

</body>
</html>
