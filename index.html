<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;
    background: linear-gradient(#0a3d1a, #000);
}

/* поле */
.field {
    position: relative;
    height: 300px;
    background: radial-gradient(circle, #1f7a3a, #0a3d1a);
    border-bottom: 3px solid #00ff88;
}

/* баланс */
.header {
    padding: 15px;
    font-size: 22px;
    color: #00ff88;
}

/* игрок (кружок) */
.player {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 40px;
}

/* мяч */
.ball {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 30px;
    transition: 0.2s;
}

/* шкала */
.bar {
    margin: 30px auto;
    width: 80%;
    height: 25px;
    background: #222;
    border-radius: 10px;
    position: relative;
}

/* зелёная зона */
.green {
    position: absolute;
    left: 45%;
    width: 10%;
    height: 100%;
    background: #00ff88;
}

/* бегунок */
.slider {
    position: absolute;
    width: 5px;
    height: 100%;
    background: white;
}

/* кнопка */
button {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 16px;
    background: #00ff88;
    border: none;
    border-radius: 10px;
}

/* нижнее меню */
.menu {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: #111;
}

.menu button {
    flex: 1;
    padding: 15px;
    background: #222;
    color: white;
}
</style>
</head>

<body>

<div class="header">
💰 <span id="coins">0</span> Coins
</div>

<div class="field">
    <div class="ball" id="ball">⚽️</div>
    <div class="player" id="player">🧍‍♂️</div>
</div>

<div class="bar">
    <div class="green"></div>
    <div class="slider" id="slider"></div>
</div>

<button onclick="kick()">KICK ⚽️</button>

<p id="result">Попади в зелёную зону</p>

<div class="menu">
    <button>💰</button>
    <button>👥</button>
    <button>🎮</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = 0;
let pos = 0;
let dir = 1;

const slider = document.getElementById("slider");
const coinsText = document.getElementById("coins");
const ball = document.getElementById("ball");
const result = document.getElementById("result");

// движение полосы
setInterval(() => {
    pos += dir * 2;

    if (pos >= 95) dir = -1;
    if (pos <= 0) dir = 1;

    slider.style.left = pos + "%";
}, 10);

// удар
function kick() {
    // анимация мяча
    ball.style.transform = "translate(-50%, -40px)";
    setTimeout(() => {
        ball.style.transform = "translate(-50%, 0)";
    }, 200);

    if (pos >= 45 && pos <= 55) {
        coins += 1;
        result.innerText = "🔥 ИДЕАЛЬНО! +1";
    } else if (pos >= 35 && pos <= 65) {
        coins += 0.3;
        result.innerText = "👌 Норм +0.3";
    } else {
        result.innerText = "❌ Мимо";
    }

    coinsText.innerText = coins.toFixed(1);
}
</script>

</body>
</html>
