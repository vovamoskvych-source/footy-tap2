<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

/* кнопка назад */
.back {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 10;
    padding: 10px 15px;
    border-radius: 10px;
    border: none;
    background: rgba(0,0,0,0.5);
    color: white;
}

/* UI */
.ui {
    position: fixed;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
    z-index: 10;
}

.score {
    font-size: 40px;
    color: #00ff88;
}

</style>
</head>

<body>

<button class="back" onclick="alert('потом вернем меню')">←</button>

<div class="ui">
    <div class="score" id="score">0</div>
    <div id="status">Tap to kick</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ЗАГРУЗКА ГРАФИКИ */
const bg = new Image();
bg.src = "https://images.unsplash.com/photo-1508098682722-e99c43a406b2";

const player = new Image();
player.src = "https://i.imgur.com/Q9qFt3m.png";

const ballImg = new Image();
ballImg.src = "https://i.imgur.com/7QFQp6H.png";

/* ИГРОВЫЕ ДАННЫЕ */
let score = 0;

let ball = {
    x: canvas.width / 2,
    y: canvas.height - 250,
    size: 40,
    velocity: 0
};

let gravity = 0.6;
let playing = true;

/* РЕСАЙЗ */
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

/* ОСНОВНОЙ ЦИКЛ */
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    /* фон */
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

    /* затемнение */
    ctx.fillStyle = "rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* игрок */
    let playerWidth = canvas.width * 0.35;
    let playerHeight = playerWidth * 1.2;

    ctx.drawImage(
        player,
        canvas.width / 2 - playerWidth / 2,
        canvas.height - playerHeight - 50,
        playerWidth,
        playerHeight
    );

    /* физика мяча */
    ball.velocity += gravity;
    ball.y += ball.velocity;

    /* ограничение */
    if (ball.y > canvas.height - 120) {
        lose();
    }

    /* мяч */
    ctx.drawImage(
        ballImg,
        ball.x - ball.size / 2,
        ball.y,
        ball.size,
        ball.size
    );

    requestAnimationFrame(loop);
}
loop();

/* УДАР */
window.addEventListener("click", () => {
    if (!playing) return;

    ball.velocity = -12;
    score++;

    document.getElementById("score").innerText = score;

    /* эффект */
    canvas.style.transform = "scale(1.02)";
    setTimeout(() => canvas.style.transform = "scale(1)", 100);
});

/* ПРОИГРЫШ */
function lose() {
    playing = false;

    document.getElementById("status").innerText =
        "❌ Упал! Счет: " + score;

    /* тряска */
    let i = 0;
    let shake = setInterval(() => {
        canvas.style.transform =
            "translate(" + (Math.random()*10-5) + "px," +
                           (Math.random()*10-5) + "px)";
        i++;
        if (i > 10) {
            clearInterval(shake);
            canvas.style.transform = "none";
        }
    }, 30);
}
</script>

</body>
</html>
