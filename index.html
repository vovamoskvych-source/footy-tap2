<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: #0f172a;
    color: white;
}

/* MAIN */
.container { padding: 15px; }

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
}

.balance {
    font-size: 32px;
    color: #00ff88;
}

/* MENU */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

.menu button {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #00ff88;
}

/* GAME */
#gameScreen {
    display: none;
    position: fixed;
    inset: 0;
}

/* ФОН */
.field {
    position: absolute;
    inset: 0;
    background:
        linear-gradient(to top, #15803d 0%, #22c55e 50%, #60a5fa 100%);
}

/* декоративные линии */
.field::after {
    content: "FOOTY COIN • FOOTY COIN • FOOTY COIN";
    position: absolute;
    width: 200%;
    top: 50%;
    font-size: 30px;
    opacity: 0.1;
    transform: rotate(-10deg);
}

/* МЯЧ */
.ball {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    left: 100px;
    bottom: 150px;
    background:
        radial-gradient(circle at 30% 30%, white, #ccc),
        repeating-linear-gradient(60deg, black 0 6px, white 6px 12px);
    animation: spin 1s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* ПРЕПЯТСТВИЯ */
.obstacle {
    position: absolute;
    width: 50px;
    height: 100px;
    bottom: 0;
    background: linear-gradient(#ef4444, #7f1d1d);
    border-radius: 10px;
}

/* UI */
.ui {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
}

#score {
    font-size: 40px;
    color: #00ff88;
}

/* старт */
#startScreen {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: rgba(0,0,0,0.6);
}

.startBtn {
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #00ff88;
}
</style>
</head>

<body>

<div class="container" id="main">
    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>
</div>

<div id="gameScreen">

    <div class="field"></div>

    <div class="ball" id="ball"></div>

    <div class="ui">
        <div id="score">0</div>
        <div id="status"></div>
        <button onclick="closeGame()">⬅</button>
    </div>

    <div id="startScreen">
        <h2>⚽ Ball Rush</h2>
        <button class="startBtn" onclick="startGame()">START</button>
    </div>

</div>

<div class="menu" id="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = 0;
let score = 0;

let ballY = 150;
let velocity = 0;
let gravity = -0.8;

let obstacles = [];
let playing = false;

/* открыть */
function openGame() {
    main.style.display = "none";
    gameScreen.style.display = "block";
    menu.style.display = "none";
    resetGame();
}

/* закрыть */
function closeGame() {
    main.style.display = "block";
    gameScreen.style.display = "none";
    menu.style.display = "flex";
    playing = false;
}

/* сброс */
function resetGame() {
    startScreen.style.display = "flex";
    score = 0;
    ballY = 150;
    velocity = 0;
    obstacles.forEach(o => o.remove());
    obstacles = [];
}

/* старт */
function startGame() {
    startScreen.style.display = "none";
    playing = true;
    loop();
}

/* тап */
document.addEventListener("click", () => {
    if (!playing) return;
    velocity = 14;
});

/* цикл */
let timer = 0;

function loop() {
    if (!playing) return;

    velocity += gravity;
    ballY += velocity;if (ballY < 0) ballY = 0;

    ball.style.bottom = ballY + "px";

    timer++;
    if (timer > 90) {
        spawnObstacle();
        timer = 0;
    }

    obstacles.forEach((obs, i) => {
        let x = parseInt(obs.style.left);
        x -= 6;
        obs.style.left = x + "px";

        if (x < 140 && x > 80 && ballY < 100) {
            lose();
        }

        if (x < -60) {
            obs.remove();
            obstacles.splice(i, 1);
            score++;
            coins++;
            scoreEl.innerText = score;
            coinsEl.innerText = coins + " FC";
        }
    });

    requestAnimationFrame(loop);
}

function spawnObstacle() {
    let obs = document.createElement("div");
    obs.className = "obstacle";
    obs.style.left = window.innerWidth + "px";
    gameScreen.appendChild(obs);
    obstacles.push(obs);
}

function lose() {
    playing = false;
    status.innerText = "❌ Проиграл";
    startScreen.style.display = "flex";
}
</script>

</body>
</html>
