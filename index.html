<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#0f5132, #000);
    color: white;
    text-align: center;
}

/* баланс */
.header {
    padding: 20px;
    font-size: 24px;
    color: #00ff88;
}

/* игрок */
.player {
    margin-top: 30px;
}

.player img {
    width: 120px;
}

/* мяч */
.ball {
    margin-top: 20px;
}

.ball img {
    width: 50px;
}

/* кнопка игры */
.play-btn {
    margin-top: 20px;
    padding: 15px 30px;
    background: #00ff88;
    color: black;
    border: none;
    border-radius: 12px;
    font-size: 18px;
}

/* экран */
.screen {
    margin-top: 15px;
    font-size: 16px;
}

/* нижнее меню */
.menu {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: #111;
}

.menu button {
    flex: 1;
    padding: 15px;
    border: none;
    background: #222;
    color: white;
}

.menu button:hover {
    background: #00ff88;
    color: black;
}
</style>
</head>

<body>

<div class="header">
💰 <span id="coins">0</span> Footy Coins
</div>

<div class="player">
<img src="https://i.imgur.com/7yUvePI.png">
</div>

<div class="ball">
<img src="https://i.imgur.com/JYUB0m3.png">
</div>

<button class="play-btn" onclick="kick()">⚽️ TAP</button>

<div class="screen" id="screen">
Нажимай и набивай мяч
</div>

<div class="menu">
<button onclick="tab('wallet')">💰</button>
<button onclick="tab('ref')">👥</button>
<button onclick="tab('game')">🎮</button>
<button onclick="tab('shop')">🛒</button>
<button onclick="tab('profile')">👤</button>
</div>

<script>
let coins = 0;

function update() {
    document.getElementById("coins").innerText = coins;
}

function kick() {
    coins += 1;
    update();
    document.getElementById("screen").innerText = "⚽️ Удар! +1 coin";
}

function tab(name) {
    const screen = document.getElementById("screen");

    if (name === "wallet") {
        screen.innerText = "💰 Баланс: " + coins;
    }

    if (name === "ref") {
        screen.innerText = "👥 Приглашай друзей!";
    }

    if (name === "game") {
        screen.innerText = "🎮 Игра активна";
    }

    if (name === "shop") {
        screen.innerText = "🛒 Магазин скоро";
    }

    if (name === "profile") {
        screen.innerText = "👤 Профиль";
    }
}
</script>

</body>
</html>
