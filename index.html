<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEST</title>

<style>
body {
    margin: 0;
    background: #111;
    overflow: hidden;
}

#ball {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: red;
    left: 100px;
    bottom: 100px;
}
</style>
</head>

<body>

<div id="ball"></div>

<script>
console.log("SCRIPT IS RUNNING");

const ball = document.getElementById("ball");

if (!ball) {
    alert("BALL NOT FOUND");
}

let y = 0;

setInterval(() => {
    y += 2;
    ball.style.bottom = y + "px";
    console.log("BALL Y:", y);
}, 30);

</script>

</body>
</html>
