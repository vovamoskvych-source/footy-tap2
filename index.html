<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* контейнер */
.container {
    padding: 15px;
}

/* карточки */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
}

/* баланс */
.balance {
    font-size: 32px;
    font-weight: bold;
    color: #00ff88;
}

/* меню */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

/* кнопки меню */
.menu button {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #00ff88;
    font-size: 26px;
    transform: translateY(-20px);
}

/* GAME */
#gameScreen {
    display: none;
    padding: 15px;
    text-align: center;
}

/* поле */
.field {
    height: 220px;
    background: linear-gradient(#1db954, #0f7a3b);
    border-radius: 20px;
    position: relative;
    margin-bottom: 20px;
}

/* игрок */
.player {
    position: absolute;
    bottom: 20px;
    left: 48%;
    font-size: 60px;
}

/* мяч */
.ball {
    position: absolute;
    bottom: 20px;
    left: 58%;
    font-size: 40px;
}

/* кнопки */
.main-btn {
    padding: 14px 20px;
    border-radius: 12px;
    border: none;
    background: #00ff88;
    color: black;
    font-weight: bold;
    margin-top: 10px;
}

/* тайминг */
.bar {
    width: 90%;
    height: 18px;
    background: #222;
    margin: 20px auto;
    border-radius: 10px;
    position: relative;
    display: none;
}

.green {
    position: absolute;
    height: 100%;
    background: #00ff88;
}

.slider {
    position: absolute;
    width: 5px;
    height: 100%;
    background: white;
}
</style>
</head>

<body>

<!-- ГЛАВНЫЙ -->
<div class="container" id="main">
    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>
</div>

<!-- ИГРА -->
<div id="gameScreen">

    <h2>⚽ Палмер</h2>

    <div class="field">
        <div class="player">🧍‍♂️</div>
        <div class="ball">⚽</div>
    </div>

    <button class="main-btn" id="startBtn" onclick="startGame()">▶ START</button>

    <div class="bar" id="bar">
        <div class="green" id="green"></div>
        <div class="slider" id="slider"></div>
    </div>

    <button class="main-btn" id="kickBtn" onclick="kick()" style="display:none;">
        ⚽ KICK
    </button>

    <p id="result"></p>

    <button class="main-btn" onclick="closeGame()">⬅ Назад</button>

</div>

<!-- МЕНЮ -->
<div class="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = Number(localStorage.getItem("coins")) || 0;

let pos = 0;
let speed = 0.8; // медленно
let zoneSize = 40;

let zoneLeft = 30;
let playing = false;

function updateCoins() {
    document.getElementById("coins").innerText = coins.toFixed(1) + " FC";
    localStorage.setItem("coins", coins);
}
updateCoins();

function openGame() {
    document.getElementById("main").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";

    resetUI();
}

function closeGame() {
    document.getElementById("main").style.display = "block";
    document.getElementById("gameScreen").style.display = "none";
    playing = false;
}

function resetUI() {
    playing = false;

    document.getElementById("startBtn").style.display = "inline-block";
    document.getElementById("kickBtn").style.display = "none";
    document.getElementById("bar").style.display = "none";

    document.getElementById("result").innerText = "Нажми START";
}

function startGame() {
    document.getElementById("startBtn").style.display = "none";
    document.getElementById("kickBtn").style.display = "inline-block";
    document.getElementById("bar").style.display = "block";

    nextRound();
}

function nextRound() {
    pos = 0;
    playing = true;

    zoneLeft = Math.random() * 40 + 30;

    document.getElementById("green").style.left = zoneLeft + "%";
    document.getElementById("green").style.width = zoneSize + "%";

    document.getElementById("result").innerText = "ЖМИ В ЗОНУ!";
}

function animate() {
    if (playing) {
        pos += speed;

        if (pos >= 100) lose();

        document.getElementById("slider").style.left = pos + "%";
    }

    requestAnimationFrame(animate);
}
animate();

function kick() {
    if (!playing) return;

    let start = zoneLeft;
    let end = zoneLeft + zoneSize;

    if (pos >= start && pos <= end) {
        win();
    } else {
        lose();
    }
}

function win() {
    playing = false;

    coins += 1;
    updateCoins();

    document.getElementById("result").innerText = "🔥 ПОПАЛ!";

    speed += 0.1;
    if (zoneSize > 12) zoneSize -= 1.5;

    setTimeout(nextRound, 900);
}

function lose() {
    playing = false;

    document.getElementById("result").innerText = "❌ ПРОИГРАЛ";

    speed = 0.8;
    zoneSize = 40;

    setTimeout(resetUI, 1200);
}
</script>

</body>
</html>
