<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* контейнер */
.container {
    padding: 15px;
}

/* карточки */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    backdrop-filter: blur(10px);
}

/* баланс */
.balance {
    font-size: 32px;
    font-weight: bold;
}

/* кнопки */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.actions button {
    flex: 1;
    padding: 15px;
    border-radius: 15px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

/* большая кнопка */
.main-btn {
    margin-top: 15px;
    width: 100%;
    padding: 18px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(90deg, orange, red);
    color: white;
    font-size: 18px;
}

/* меню */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    align-items: center;
}

/* обычные кнопки */
.menu button {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

/* центральная кнопка */
.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00ff88, #00cc66);
    font-size: 26px;
    transform: translateY(-20px);
    box-shadow: 0 0 20px #00ff88;
}

/* игра */
#gameScreen {
    display: none;
    padding: 20px;
    text-align: center;
}

.bar {
    margin: 30px auto;
    width: 80%;
    height: 25px;
    background: #222;
    border-radius: 10px;
    position: relative;
}

.green {
    position: absolute;
    left: 45%;
    width: 10%;
    height: 100%;
    background: #00ff88;
}

.slider {
    position: absolute;
    width: 5px;
    height: 100%;
    background: white;
}
</style>
</head>

<body>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div class="container" id="main">

    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>

    <div class="card">
        <div class="actions">
            <button>⬆️</button>
            <button>💰</button>
            <button>📋</button>
        </div>

        <button class="main-btn">💡 Как заработать?</button>
    </div>

</div>

<!-- ЭКРАН ИГРЫ -->
<div id="gameScreen">

    <h2>⚽ Игра</h2>

    <div class="bar">
        <div class="green"></div>
        <div class="slider" id="slider"></div>
    </div>

    <button onclick="kick()">KICK</button>

    <p id="result"></p>

    <button onclick="closeGame()">⬅ Назад</button>

</div>

<!-- МЕНЮ -->
<div class="menu">
    <button>💰</button>
    <button>👥</button>

    <button class="play" onclick="openGame()">⚽</button>

    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = 0;
let pos = 0;
let dir = 1;

// обновление баланса
function update() {
    document.getElementById("coins").innerText = coins.toFixed(1) + " FC";
}

// движение полосы
setInterval(() => {
    pos += dir * 2;

    if (pos >= 95) dir = -1;
    if (pos <= 0) dir = 1;

    const slider = document.getElementById("slider");
    if (slider) slider.style.left = pos + "%";
}, 10);

// открыть игру
function openGame() {
    document.getElementById("main").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
}

// закрыть игру
function closeGame() {
    document.getElementById("main").style.display = "block";
    document.getElementById("gameScreen").style.display = "none";
}

// удар
function kick() {
    const result = document.getElementById("result");

    if (pos >= 45 && pos <= 55) {
        coins += 1;
        result.innerText = "🔥 PERFECT +1";
    } else if (pos >= 35 && pos <= 65) {
        coins += 0.3;
        result.innerText = "👌 GOOD +0.3";
    } else {
        result.innerText = "❌ MISS";
    }

    update();
}
</script>

</body>
</html>
