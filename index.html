<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ball Fix</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #14532d;
}

/* МЯЧ */
#ball {
    position: absolute;
    left: 100px;
    bottom: 100px;
    width: 60px;
    height: 60px;
    background: red;
    border-radius: 50%;
}

/* СЧЁТ */
#score {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 30px;
    color: white;
}
</style>
</head>

<body>

<div id="ball"></div>
<div id="score">BALL TEST</div>

<script>
console.log("SCRIPT STARTED");

const ball = document.getElementById("ball");

if (!ball) {
    alert("BALL NOT FOUND");
}

let y = 0;
let vy = 0;

const gravity = 0.6;
const jumpPower = 15;

window.addEventListener("pointerdown", () => {
    console.log("CLICK");
    vy = jumpPower;
});

function loop() {
    vy -= gravity;
    y += vy;

    if (y < 0) {
        y = 0;
        vy = 0;
    }

    ball.style.bottom = y + "px";

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
