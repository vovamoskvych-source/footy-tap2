<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ball Test</title>

<style>
body { margin:0; background:#111; color:white; }

#ball {
    position: absolute;
    width: 60px;
    height: 60px;
    background: red;
    border-radius: 50%;
    left: 100px;
    bottom: 150px;
}

#btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 20px;
    font-size: 20px;
}
</style>

</head>

<body>

<div id="ball"></div>

<button id="btn"></button>

<script src="script.js"></script>

</body>
</html>
