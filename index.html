<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* контейнер */
.container {
    padding: 15px;
}

/* glass карточки */
.card {
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 20px rgba(0,255,136,0.05);
}

/* баланс */
.balance {
    font-size: 34px;
    font-weight: bold;
    color: #00ff88;
}

/* кнопки */
.actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.actions button {
    flex: 1;
    padding: 15px;
    border-radius: 15px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
    transition: 0.2s;
}

.actions button:hover {
    background: rgba(0,255,136,0.2);
}

/* main button */
.main-btn {
    margin-top: 15px;
    width: 100%;
    padding: 18px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(90deg, #00ff88, #00cc66);
    color: black;
    font-weight: bold;
}

/* меню */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    align-items: center;
}

.menu button {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00ff88, #00cc66);
    font-size: 26px;
    transform: translateY(-20px);
    box-shadow: 0 0 25px #00ff88;
}

/* GAME */
#gameScreen {
    display: none;
    padding: 20px;
    text-align: center;
}

.bar {
    margin: 30px auto;
    width: 80%;
    height: 25px;
    background: #222;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
}

.green {
    position: absolute;
    left: 40%;
    width: 20%;
    height: 100%;
    background: #00ff88;
    opacity: 0.7;
}

.slider {
    position: absolute;
    width: 6px;
    height: 100%;
    background: white;
    box-shadow: 0 0 10px white;
}

button {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container" id="main">

    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>

    <div class="card">
        <div class="actions">
            <button>⬆️</button>
            <button>💰</button>
            <button>📊</button>
        </div>

        <button class="main-btn">💡 Upgrade soon</button>
    </div>

</div>

<!-- GAME -->
<div id="gameScreen">

    <h2>⚽ Timing Shot</h2>

    <div class="bar">
        <div class="green"></div>
        <div class="slider" id="slider"></div>
    </div>

    <button onclick="kick()" class="main-btn">KICK ⚽</button>

    <p id="result"></p>

    <button onclick="closeGame()">⬅ Back</button>
</div>

<!-- MENU -->
<div class="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = Number(localStorage.getItem("coins")) || 0;

let pos = 0;
let dir = 1;

let level = 1;
let speed = 2;

let zoneLeft = 40;
let zoneSize = 25;

let gameActive = false;
let failed = false;

function updateCoins() {
    document.getElementById("coins").innerText = coins.toFixed(1) + " FC";
    localStorage.setItem("coins", coins);
}

updateCoins();

// новая зона каждый раунд
function newRound() {
    pos = 0;
    dir = 1;
    failed = false;
    gameActive = true;

    zoneLeft = Math.random() * 50 + 20; // 20–70%
    
    const green = document.querySelector(".green");
    green.style.left = zoneLeft + "%";
    green.style.width = zoneSize + "%";

    document.getElementById("result").innerText = "⚽ Tap at perfect moment!";
}

// анимация стрелки
function animate() {
    if (gameActive) {
        pos += dir * speed;

        if (pos >= 100) {
            miss();
        }

        const slider = document.getElementById("slider");
        if (slider) slider.style.left = pos + "%";
    }

    requestAnimationFrame(animate);
}
animate();

// удар
function kick() {
    if (!gameActive) return;

    let hitStart = zoneLeft;
    let hitEnd = zoneLeft + zoneSize;

    if (pos >= hitStart && pos <= hitEnd) {
        win();
    } else {
        miss();
    }
}

function win() {
    gameActive = false;

    let reward = level * 0.5;
    coins += reward;

    document.getElementById("result").innerText =
        "🔥 PERFECT! +" + reward.toFixed(1);

    levelUp();
    updateCoins();

    setTimeout(newRound, 1200);
}

function miss() {
    if (!gameActive) return;

    gameActive = false;

    document.getElementById("result").innerText =
        "❌ MISS! Level reset";

    level = 1;
    speed = 2;
    zoneSize = 25;

    setTimeout(newRound, 1200);
}

function levelUp() {
    level++;

    // усложнение
    speed += 0.3;

    if (zoneSize > 8) {
        zoneSize -= 1.5;
    }
}

function openGame() {
    document.getElementById("main").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";

    level = 1;
    speed = 2;
    zoneSize = 25;

    newRound();
}

function closeGame() {
    document.getElementById("main").style.display = "block";
    document.getElementById("gameScreen").style.display = "none";

    gameActive = false;
}
</script>

</body>
</html>
