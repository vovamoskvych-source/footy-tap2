<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ball Rush</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MAIN MENU -->
<div id="main">
    <div class="card">
        <h2>⚽ Footy Coin</h2>
        <div id="coins">0 FC</div>

        <button onclick="openGame()">PLAY</button>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen">

    <div class="bg"></div>

    <div id="ball"></div>

    <div id="score">0</div>

    <div id="startScreen">
        <button onclick="startGame()">START</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
