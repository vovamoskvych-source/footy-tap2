<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* MAIN */
.container {
    padding: 15px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
}

.balance {
    font-size: 32px;
    color: #00ff88;
}

.title {
    color: #00ff88;
    margin-bottom: 10px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.action {
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

/* MENU */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

.menu button {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #00ff88;
    font-size: 26px;
}

/* GAME */
#gameScreen {
    display: none;
    position: fixed;
    inset: 0;
    overflow: hidden;
}

/* фон стадион */
.field {
    position: absolute;
    inset: 0;
    background:
        linear-gradient(to bottom, #1e293b 0%, #16a34a 60%, #14532d 100%);
}

/* трибуны */
.field::before {
    content: "FOOTY • FOOTY • FOOTY • FOOTY • FOOTY";
    position: absolute;
    top: 40px;
    width: 100%;
    text-align: center;
    opacity: 0.2;
    font-size: 24px;
}

/* мяч */
.ball {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: white;
    left: 80px;
    bottom: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.eyes {
    display: flex;
    gap: 5px;
}

.eye {
    width: 10px;
    height: 10px;
    background: black;
    border-radius: 50%;
}

/* препятствия */
.obstacle {
    position: absolute;
    width: 40px;
    height: 70px;
    background: red;
    bottom: 120px;
    border-radius: 8px;
}

/* UI */
.ui {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
}

#score {
    font-size: 40px;
    color: #00ff88;
}

/* старт */
#startScreen {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: rgba(0,0,0,0.5);
}

.startBtn {
    padding: 15px 30px;
    font-size: 20px;
    background: #00ff88;
    border: none;
    border-radius: 12px;
}
</style>
</head>

<body>

<!-- MAIN -->
<div class="container" id="main">

    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>

    <div class="card">
        <div class="title">Финансы</div>
        <div class="grid">
            <button class="action">💸 Ввод</button>
            <button class="action">💰 Вывод</button>
            <button class="action">⏳ Hold</button>
            <button class="action">👥 Друзья</button>
        </div>
    </div>

</div>

<!-- GAME -->
<div id="gameScreen">

    <div class="field"></div>

    <div class="ball" id="ball">
        <div class="eyes">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
        FC
    </div>

    <div class="ui">
        <div id="score">0</div>
        <div id="status"></div>
        <button onclick="closeGame()">⬅</button>
    </div>

    <div id="startScreen">
        <h2>⚽ Ball Rush</h2>
        <button class="startBtn" onclick="startGame()">START</button>
    </div>

</div>

<!-- MENU -->
<div class="menu" id="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = 0;
let score = 0;

let ballY = 120;
let velocity = 0;
let gravity = -0.45;

let obstacles = [];
let playing = false;

/* открыть */
function openGame() {
    main.style.display = "none";
    gameScreen.style.display = "block";
    menu.style.display = "none";
    resetGame();
}

/* закрыть */
function closeGame() {
    main.style.display = "block";
    gameScreen.style.display = "none";
    menu.style.display = "flex";
    playing = false;
}

/* сброс */
function resetGame() {
    startScreen.style.display = "flex";
    score = 0;
    ballY = 120;
    velocity = 0;
    playing = false;

    obstacles.forEach(o => o.remove());
    obstacles = [];
}

/* старт */
function startGame() {
    startScreen.style.display = "none";
    playing = true;
    loop();
}

/* тап */
document.addEventListener("click", () => {
    if (!playing) return;
    velocity = 8;
});

/* цикл */
let spawnTimer = 0;

function loop() {
    if (!playing) return;

    velocity += gravity;
    ballY += velocity;

    if (ballY < 0) ballY = 0;

    ball.style.bottom = ballY + "px";

    spawnTimer++;
    if (spawnTimer > 80) {
        spawnObstacle();
        spawnTimer = 0;
    }

    obstacles.forEach((obs, i) => {
        let x = parseInt(obs.style.left);
        x -= 5;
        obs.style.left = x + "px";

        if (x < 110 && x > 50 && ballY < 90) {
            lose();
        }

        if (x < -50) {
            obs.remove();
            obstacles.splice(i, 1);
            score++;
            coins++;
            scoreEl.innerText = score;
            coinsEl.innerText = coins + " FC";
        }
    });

    requestAnimationFrame(loop);
}

/* создать препятствие */
function spawnObstacle() {
    let obs = document.createElement("div");
    obs.className = "obstacle";
    obs.style.left = window.innerWidth + "px";
    gameScreen.appendChild(obs);
    obstacles.push(obs);
}

/* проигрыш */
function lose() {
    playing = false;
    status.innerText = "❌ Проиграл";
    startScreen.style.display = "flex";
}
</script>

</body>
</html>
