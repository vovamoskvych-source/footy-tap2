<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ball Rush</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to top, #14532d, #22c55e);
}

/* МЯЧ */
#ball {
    position: absolute;
    left: 100px;
    bottom: 150px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background:
        radial-gradient(circle at 30% 30%, #fff, #ccc),
        repeating-linear-gradient(45deg, #000 0 6px, #fff 6px 12px);
}

/* СЧЁТ */
#score {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 40px;
    color: white;
}
</style>
</head>

<body>

<div id="ball"></div>
<div id="score">0</div>

<script>
const ball = document.getElementById("ball");
const scoreEl = document.getElementById("score");

let ballY = 150;
let velocity = 0;

const gravity = 0.6;     // мягкая физика
const jumpPower = 14;    // норм прыжок

let jumpsLeft = 2;       // дабл прыжок
let score = 0;

/* ПРЫЖОК (ДАБЛ) */
window.addEventListener("pointerdown", () => {
    if (jumpsLeft > 0) {
        velocity = jumpPower;
        jumpsLeft--;
    }
});

/* ИГРОВОЙ ЦИКЛ */
function loop() {

    velocity -= gravity;
    ballY += velocity;

    // земля
    if (ballY < 0) {
        ballY = 0;
        velocity = 0;
        jumpsLeft = 2; // сброс прыжков
    }

    ball.style.bottom = ballY + "px";

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
