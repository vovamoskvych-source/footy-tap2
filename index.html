<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ball Rush</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(to top, #14532d, #22c55e);
}

/* МЯЧ */
#ball {
    position: absolute;
    left: 100px;
    bottom: 120px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background:
        radial-gradient(circle at 30% 30%, #fff, #ccc);
}

/* БАРЬЕР */
.obstacle {
    position: absolute;
    bottom: 0;
    width: 50px;
    background: linear-gradient(#ef4444, #7f1d1d);
    border-radius: 8px;
}

/* СЧЁТ */
#score {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 40px;
    color: white;
}
</style>
</head>

<body>

<div id="ball"></div>
<div id="score">0</div>

<script>
const ball = document.getElementById("ball");
const scoreEl = document.getElementById("score");

let x = 100;      // горизонталь мяча (фикс)
let y = 120;      // высота
let vy = 0;       // скорость по Y

let gravity = 0.7;
let jumpPower = 14;

let obstacles = [];
let score = 0;

/* ПРЫЖОК (БЕЗ ДАБЛА) */
window.addEventListener("pointerdown", () => {
    if (y === 0) {
        vy = jumpPower;
    }
});

/* ПРЕПЯТСТВИЯ */
setInterval(() => {
    let obs = document.createElement("div");
    obs.className = "obstacle";

    let h = 60 + Math.random() * 80;
    obs.style.height = h + "px";
    obs.style.left = window.innerWidth + "px";

    document.body.appendChild(obs);
    obstacles.push(obs);
}, 1500);

/* ЛОГИКА */
function loop() {

    // физика прыжка
    vy -= gravity;
    y += vy;

    if (y < 0) {
        y = 0;
        vy = 0;
    }

    ball.style.bottom = y + "px";

    // движение препятствий
    obstacles.forEach((o, i) => {
        let ox = parseFloat(o.style.left);
        ox -= 5;
        o.style.left = ox + "px";

        // столкновение
        if (ox < 140 && ox > 90 && y < parseFloat(o.style.height)) {
            alert("LOSE");
            location.reload();
        }

        // удаление + счёт
        if (ox < -100) {
            o.remove();
            obstacles.splice(i, 1);
            score++;
            scoreEl.innerText = score;
        }
    });

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
