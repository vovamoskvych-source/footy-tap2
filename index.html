<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin - Ball Rush</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container" id="main">
    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>
</div>

<div id="gameScreen">

    <div class="field"></div>

    <div class="logo">⚽ FOOTY COIN</div>

    <div class="phrases" id="phrases"></div>

    <div class="ball" id="ball"></div>

    <div class="ui">
        <div id="score">0</div>
        <div id="status"></div>
        <button onclick="closeGame()" class="backBtn">⬅</button>
    </div>

    <div id="startScreen">
        <h2>⚽ BALL RUSH</h2>
        <button class="startBtn" onclick="startGame()">START</button>
    </div>

</div>

<div class="menu" id="menu">
    <button>💰 Ввод</button>
    <button>📤 Вывод</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>📊 Холд</button>
    <button>👥 Рефералы</button>
</div>

<script src="script.js"></script>

</body>
</html>
