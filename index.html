<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  color: white;

  /* ФУТБОЛЬНОЕ ПОЛЕ */
  background: url("https://i.imgur.com/3ZQ3Z7p.jpg") no-repeat center center;
  background-size: cover;
}

.overlay {
  background: rgba(0,0,0,0.6);
  min-height: 100vh;
  padding-top: 30px;
}

h1 {
  font-size: 28px;
}

.player {
  width: 160px;
  margin-top: 20px;
  transition: 0.1s;
  cursor: pointer;
}

.score {
  font-size: 28px;
  margin: 10px;
}

.energy {
  margin: 10px;
}

.energy-bar {
  width: 220px;
  height: 14px;
  background: #1f2937;
  margin: auto;
  border-radius: 10px;
  overflow: hidden;
}

.energy-fill {
  height: 100%;
  background: #22c55e;
  width: 100%;
}

button {
  margin-top: 15px;
  font-size: 18px;
  padding: 10px 20px;
  border-radius: 12px;
  border: none;
  background: #16a34a;
  color: white;
}

.coin {
  position: absolute;
  color: yellow;
  font-size: 18px;
  animation: float 1s forwards;
}

@keyframes float {
  0% {opacity:1; transform:translateY(0);}
  100% {opacity:0; transform:translateY(-40px);}
}
</style>
</head>

<body>

<div class="overlay">

<h1>⚽️ Footy Coin</h1>

<!-- 👉 ВСТАВЬ СЮДА PALMER -->
<img id="player" class="player"
src="https://i.imgur.com/8QfQZ6M.png">

<div class="score">
💰 Coins: <span id="coins">0</span>
</div>

<div class="energy-bar">
  <div id="energyFill" class="energy-fill"></div>
</div>

<div class="energy">
⚡️ <span id="energy">100</span>/100
</div>

<button onclick="tap()">KICK ⚽️</button>

</div>

<script>
let tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

let coins = 0;
let energy = 100;
let maxEnergy = 100;
let income = 1;

// 🔥 КЛИК ПО КНОПКЕ И ИГРОКУ
function tap() {
  if (energy <= 0) return;

  energy--;
  coins += income;

  update();

  let player = document.getElementById("player");
  player.style.transform = "scale(1.1) rotate(10deg)";
  setTimeout(() => {
    player.style.transform = "scale(1)";
  }, 100);

  showCoin();
}

// КЛИК ПО КАРТИНКЕ
document.getElementById("player").onclick = tap;

function update() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("energy").innerText = energy;

  let percent = (energy / maxEnergy) * 100;
  document.getElementById("energyFill").style.width = percent + "%";
}

// ЭНЕРГИЯ МЕДЛЕННЕЕ
setInterval(() => {
  if (energy < maxEnergy) {
    energy += 1;
    update();
  }
}, 3000);

// ЭФФЕКТ МОНЕТ
function showCoin() {
  let coin = document.createElement("div");
  coin.innerText = "+" + income;
  coin.className = "coin";

  coin.style.left = (window.innerWidth/2 - 10) + "px";
  coin.style.top = (window.innerHeight/2) + "px";

  document.body.appendChild(coin);

  setTimeout(() => coin.remove(), 1000);
}

update();
</script>

</body>
</html>
