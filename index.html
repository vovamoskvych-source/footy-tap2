<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<!-- PHASER -->
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* MAIN */
.container {
    padding: 15px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
}

.balance {
    font-size: 32px;
    color: #00ff88;
}

.title {
    color: #00ff88;
    margin-bottom: 10px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.action {
    padding: 15px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

/* MENU (НЕ ТРОГАЕМ) */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

.menu button {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #00ff88;
    font-size: 26px;
}

/* GAME */
#gameScreen {
    display: none;
    position: fixed;
    inset: 0;
    background: black;
}
</style>
</head>

<body>

<!-- MAIN -->
<div class="container" id="main">

    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>

    <div class="card">
        <div class="title">Финансы</div>
        <div class="grid">
            <button class="action">💸 Ввод</button>
            <button class="action">💰 Вывод</button>
            <button class="action">⏳ Hold</button>
            <button class="action">👥 Друзья</button>
        </div>
    </div>

</div>

<!-- GAME -->
<div id="gameScreen"></div>

<!-- MENU -->
<div class="menu" id="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let game;

function openGame() {
    main.style.display = "none";
    gameScreen.style.display = "block";
    menu.style.display = "none";

    startPhaser();
}

function closeGame() {
    location.reload();
}

/* PHASER */
function startPhaser() {

    if (game) return;

    const config = {
        type: Phaser.AUTO,
        width: window.innerWidth,
        height: window.innerHeight,
        parent: "gameScreen",
        physics: {
            default: "arcade",
            arcade: { gravity: { y: 800 } }
        },
        scene: {
            preload,
            create,
            update
        }
    };

    game = new Phaser.Game(config);

    let player;
    let obstacles;
    let score = 0;
    let text;

    function preload() {
        this.load.image("ball", "https://i.imgur.com/7QF5F0d.png"); // норм мяч
        this.load.image("block", "https://i.imgur.com/6X12Q0F.png"); // препятствие
        this.load.image("bg", "https://i.imgur.com/3e5Z5Zs.jpg"); // стадион
    }

    function create() {

        this.add.image(0,0,"bg").setOrigin(0).setDisplaySize(this.scale.width, this.scale.height);

        player = this.physics.add.sprite(200, 300, "ball");
        player.setBounce(0.3);
        player.setCollideWorldBounds(true);

        obstacles = this.physics.add.group();

        this.input.on("pointerdown", () => {
            player.setVelocityY(-400);
        });

        this.time.addEvent({
            delay: 1500,
            loop: true,
            callback: () => {
                let obs = obstacles.create(this.scale.width, 400, "block");
                obs.setVelocityX(-250);
            }
        });

        this.physics.add.collider(player, obstacles, () => {
            this.scene.restart();
        });

        text = this.add.text(20,20,"0",{fontSize:"30px",fill:"#fff"});

        this.time.addEvent({
            delay: 1000,
            loop: true,
            callback: () => {
                score++;
                text.
