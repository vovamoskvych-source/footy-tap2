<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
    text-align: center;
}

/* главный экран */
.container {
    padding: 20px;
}

.balance {
    font-size: 30px;
    color: #00ff88;
}

/* экран игры */
#gameScreen {
    display: none;
}

/* поле */
.field {
    background: linear-gradient(#1e7f3f, #14532d);
    height: 300px;
    position: relative;
    margin-top: 20px;
    border-radius: 20px;
}

/* игрок */
.player {
    position: absolute;
    bottom: 20px;
    left: 45%;
    font-size: 70px;
}

/* мяч */
.ball {
    position: absolute;
    bottom: 20px;
    left: 55%;
    font-size: 40px;
}

/* кнопка */
button {
    margin-top: 20px;
    padding: 15px 25px;
    border-radius: 12px;
    border: none;
    background: #00ff88;
    font-size: 18px;
}

/* тайминг бар */
.bar {
    margin: 20px auto;
    width: 80%;
    height: 20px;
    background: #222;
    border-radius: 10px;
    position: relative;
}

.green {
    position: absolute;
    height: 100%;
    background: #00ff88;
}

.slider {
    position: absolute;
    width: 5px;
    height: 100%;
    background: white;
}
</style>
</head>

<body>

<div class="container" id="main">
    <h2>Footy Coin</h2>
    <div class="balance" id="coins">0 FC</div>

    <button onclick="openGame()">⚽ Играть</button>
</div>

<!-- экран игры -->
<div id="gameScreen">

    <h2>⚽ Палмер</h2>

    <div class="field">
        <div class="player">🧍‍♂️</div>
        <div class="ball">⚽</div>
    </div>

    <button onclick="startGame()">▶ START</button>

    <div class="bar" id="bar" style="display:none;">
        <div class="green" id="green"></div>
        <div class="slider" id="slider"></div>
    </div>

    <button onclick="kick()" id="kickBtn" style="display:none;">KICK</button>

    <p id="result"></p>

    <button onclick="closeGame()">⬅ Назад</button>

</div>

<script>
let coins = Number(localStorage.getItem("coins")) || 0;

let pos = 0;
let speed = 1;
let zoneSize = 40;
let zoneLeft = 30;

let playing = false;

function updateCoins() {
    document.getElementById("coins").innerText = coins.toFixed(1) + " FC";
    localStorage.setItem("coins", coins);
}
updateCoins();

function openGame() {
    document.getElementById("main").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
}

function closeGame() {
    document.getElementById("main").style.display = "block";
    document.getElementById("gameScreen").style.display = "none";
}

/* НАЧАТЬ ИГРУ */
function startGame() {
    document.getElementById("bar").style.display = "block";
    document.getElementById("kickBtn").style.display = "inline-block";

    nextRound();
}

/* новый раунд */
function nextRound() {
    pos = 0;
    playing = true;

    zoneLeft = Math.random() * 40 + 30;

    document.getElementById("green").style.left = zoneLeft + "%";
    document.getElementById("green").style.width = zoneSize + "%";

    document.getElementById("result").innerText = "ЖМИ В НУЖНЫЙ МОМЕНТ";
}

/* движение */
function animate() {
    if (playing) {
        pos += speed;

        if (pos >= 100) {
            lose();
        }

        document.getElementById("slider").style.left = pos + "%";
    }

    requestAnimationFrame(animate);
}
animate();

/* удар */
function kick() {
    if (!playing) return;

    let start = zoneLeft;
    let end = zoneLeft + zoneSize;

    if (pos >= start && pos <= end) {
        win();
    } else {
        lose();
    }
}

function win() {
    playing = false;

    coins += 1;
    updateCoins();

    document.getElementById("result").innerText = "🔥 ПОПАЛ!";

    /* усложнение */
    speed += 0.2;
    if (zoneSize > 10) zoneSize -= 2;

    setTimeout(nextRound, 1000);
}

function lose() {
    playing = false;

    document.getElementById("result").innerText = "❌ ПРОИГРАЛ";

    /* сброс */
    speed = 1;
    zoneSize = 40;

    setTimeout(nextRound, 1500);
}
</script>

</body>
</html>
