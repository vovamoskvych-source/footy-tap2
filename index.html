<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

.ui {
    position: fixed;
    top: 20px;
    width: 100%;
    text-align: center;
    color: white;
}

.score {
    font-size: 40px;
    color: #00ff88;
}
</style>
</head>

<body>

<div class="ui">
    <div class="score" id="score">0</div>
    <div id="status">Жми чтобы набивать</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* ИГРА */
let score = 0;
let playing = true;

let ball = {
    x: canvas.width / 2,
    y: canvas.height - 200,
    r: 20,
    velocity: 0
};

let gravity = 0.6;

/* ЦИКЛ */
function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawStadium();
    drawGoal();
    drawPlayer();
    updateBall();
    drawBall();

    requestAnimationFrame(loop);
}
loop();

/* СТАДИОН */
function drawStadium() {
    // небо
    let grad = ctx.createLinearGradient(0,0,0,canvas.height);
    grad.addColorStop(0, "#0f172a");
    grad.addColorStop(1, "#020617");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // трибуны
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height/2);

    // поле
    ctx.fillStyle = "#1f7a3d";
    ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);
}

/* ВОРОТА */
function drawGoal() {
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;

    let w = 200;
    let h = 100;

    ctx.strokeRect(
        canvas.width/2 - w/2,
        canvas.height/2 - 50,
        w,
        h
    );
}

/* ИГРОК */
function drawPlayer() {
    let x = canvas.width/2;
    let y = canvas.height - 120;

    ctx.fillStyle = "#00ff88";

    // тело
    ctx.fillRect(x - 10, y - 40, 20, 40);

    // голова
    ctx.beginPath();
    ctx.arc(x, y - 55, 10, 0, Math.PI*2);
    ctx.fill();
}

/* МЯЧ */
function drawBall() {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
    ctx.fill();
}

/* ФИЗИКА */
function updateBall() {
    if (!playing) return;

    ball.velocity += gravity;
    ball.y += ball.velocity;

    if (ball.y > canvas.height - 100) {
        lose();
    }
}

/* УДАР */
window.addEventListener("click", () => {
    if (!playing) return;

    ball.velocity = -12;
    score++;

    document.getElementById("score").innerText = score;
});

/* ПРОИГРЫШ */
function lose() {
    playing = false;
    document.getElementById("status").innerText =
        "❌ Упал! Счёт: " + score;
}
</script>

</body>
</html>
