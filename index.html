<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
}

/* MAIN */
.container {
    padding: 15px;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
}

.balance {
    font-size: 32px;
    color: #00ff88;
}

/* MENU (НЕ ТРОГАЕМ) */
.menu {
    position: fixed;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
}

.menu button {
    background: rgba(255,255,255,0.05);
    border: none;
    color: white;
    padding: 12px;
    border-radius: 12px;
}

.play {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #00ff88;
    font-size: 26px;
}

/* GAME */
#gameScreen {
    display: none;
    position: fixed;
    inset: 0;
    overflow: hidden;
}

/* ЯРКИЙ СТАДИОН */
.field {
    position: absolute;
    inset: 0;
    background:
        linear-gradient(to bottom, #0ea5e9 0%, #22c55e 60%, #15803d 100%);
}

/* линии */
.field::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background:
        linear-gradient(white, white) center/2px 100% no-repeat;
    opacity: 0.2;
}

/* МЯЧ FC */
.ball {
    position: absolute;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff, #cccccc);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: black;
    left: 80px;
    bottom: 120px;
}

/* препятствия */
.obstacle {
    position: absolute;
    width: 45px;
    height: 80px;
    background: linear-gradient(#ff3b3b, #7f0000);
    bottom: 120px;
    border-radius: 8px;
}

/* UI */
.ui {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
}

#score {
    font-size: 40px;
    color: #00ff88;
}

/* старт */
#startScreen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.5);
}

.startBtn {
    padding: 15px 30px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #00ff88;
}
</style>
</head>

<body>

<!-- MAIN -->
<div class="container" id="main">
    <div class="card">
        <div>Баланс</div>
        <div class="balance" id="coins">0 FC</div>
    </div>
</div>

<!-- GAME -->
<div id="gameScreen">

    <div class="field"></div>

    <div class="ball" id="ball">FC</div>

    <div class="ui">
        <div id="score">0</div>
        <div id="status"></div>
        <button onclick="closeGame()">⬅</button>
    </div>

    <div id="startScreen">
        <h2>⚽ Ball Rush</h2>
        <button class="startBtn" onclick="startGame()">START</button>
    </div>

</div>

<!-- MENU -->
<div class="menu" id="menu">
    <button>💰</button>
    <button>👥</button>
    <button class="play" onclick="openGame()">⚽</button>
    <button>🛒</button>
    <button>👤</button>
</div>

<script>
let coins = 0;
let score = 0;

let ballY = 120;
let velocity = 0;
let gravity = -0.5;

let obstacles = [];
let playing = false;

/* открыть */
function openGame() {
    main.style.display = "none";
    gameScreen.style.display = "block";
    menu.style.display = "none";

    resetGame();
}

/* закрыть */
function closeGame() {
    main.style.display = "block";
    gameScreen.style.display = "none";
    menu.style.display = "flex";
    playing = false;
}

/* сброс */
function resetGame() {
    startScreen.style.display = "flex";
    score = 0;
    ballY = 120;
    velocity = 0;
    playing = false;

    obstacles.forEach(o => o.remove());
    obstacles = [];
}

/* старт */
function startGame() {
    startScreen.style.display = "none";
    playing = true;
    loop();
}

/* тап */
document.addEventListener("click", () => {
    if (!playing) return;
    velocity = 9;
});

/* цикл */
function loop() {
    if (!playing) return;

    velocity += gravity;
    ballY += velocity;if (ballY < 0) ballY = 0;

    ball.style.bottom = ballY + "px";

    if (Math.random() < 0.02) {
        let obs = document.createElement("div");
        obs.className = "obstacle";
        obs.style.left = window.innerWidth + "px";
        gameScreen.appendChild(obs);
        obstacles.push(obs);
    }

    obstacles.forEach((obs, i) => {
        let x = parseInt(obs.style.left);
        x -= 5;
        obs.style.left = x + "px";

        if (x < 110 && x > 50 && ballY < 90) {
            lose();
        }

        if (x < -50) {
            obs.remove();
            obstacles.splice(i, 1);
            score++;
            coins++;
            scoreEl.innerText = score;
            coinsEl.innerText = coins + " FC";
        }
    });

    requestAnimationFrame(loop);
}

/* проигрыш */
function lose() {
    playing = false;
    status.innerText = "❌ Проиграл";
    startScreen.style.display = "flex";
}
</script>

</body>
</html>
