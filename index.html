<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Footy Coin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle, #0f5132, #000);
    color: white;
    text-align: center;
}

/* заголовок */
h1 {
    margin-top: 20px;
    color: #00ff88;
}

/* монеты */
.coins {
    font-size: 24px;
    margin: 10px;
}

/* игрок (пока просто блок) */
.player {
    width: 100px;
    height: 150px;
    background: #00ff88;
    margin: 20px auto;
    border-radius: 10px;
    transition: transform 0.2s;
}

/* анимация удара */
.kick {
    transform: rotate(-20deg);
}

/* мяч */
.ball {
    width: 30px;
    height: 30px;
    background: white;
    border-radius: 50%;
    margin: 10px auto;
    transition: transform 0.2s;
}

/* шкала */
.bar {
    position: relative;
    width: 80%;
    height: 25px;
    background: #222;
    margin: 30px auto;
    border-radius: 10px;
}

.green-zone {
    position: absolute;
    left: 45%;
    width: 10%;
    height: 100%;
    background: #00ff88;
}

.slider {
    position: absolute;
    width: 5px;
    height: 100%;
    background: white;
    left: 0;
}

/* кнопка */
button {
    padding: 15px 30px;
    font-size: 18px;
    background: #00ff88;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>⚽️ Footy Coin</h1>
<div class="coins">💰 Coins: <span id="coins">0</span></div>

<div class="player" id="player"></div>
<div class="ball" id="ball"></div>

<div class="bar">
    <div class="green-zone"></div>
    <div class="slider" id="slider"></div>
</div>

<button onclick="hit()">KICK</button>

<script>
let coins = 0;
let pos = 0;
let direction = 1;

const slider = document.getElementById("slider");
const coinText = document.getElementById("coins");
const player = document.getElementById("player");
const ball = document.getElementById("ball");

// движение полосы
setInterval(() => {
    pos += direction * 2;

    if (pos >= 95) direction = -1;
    if (pos <= 0) direction = 1;

    slider.style.left = pos + "%";
}, 10);

function hit() {
    // анимация
    player.classList.add("kick");
    ball.style.transform = "translateY(-20px)";

    setTimeout(() => {
        player.classList.remove("kick");
        ball.style.transform = "translateY(0)";
    }, 200);

    // логика
    if (pos >= 45 && pos <= 55) {
        coins += 1;
    } else if (pos >= 35 && pos <= 65) {
        coins += 0.3;
    }

    coinText.innerText = coins.toFixed(1);
}
</script>

</body>
</html>
