<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ball Safe Test</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
}

#ball {
    position: absolute;
    width: 60px;
    height: 60px;
    background: red;
    border-radius: 50%;
    left: 100px;
    bottom: 0px;
}

#debug {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<div id="ball"></div>
<div id="debug">loading...</div>

<script>
console.log("GAME START");

const ball = document.getElementById("ball");
const debug = document.getElementById("debug");

let y = 0;
let vy = 0;

const gravity = 0.6;
const jumpPower = 14;

window.addEventListener("pointerdown", () => {
    vy = jumpPower;
});

function loop() {
    vy -= gravity;
    y += vy;

    if (y < 0) {
        y = 0;
        vy = 0;
    }

    ball.style.bottom = y + "px";

    debug.innerText = "y: " + y.toFixed(2) + " vy: " + vy.toFixed(2);

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
